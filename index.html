<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Blossom Word Game" />
    <meta name="robots" content="index, follow" />

    <!-- Icons & PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/logo.png" type="image/png" sizes="any" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#fce303" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1b22" media="(prefers-color-scheme: dark)" />

    <!-- Site-wide structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://blossomwordgame.com/#website",
            "url": "https://blossomwordgame.com/",
            "name": "Blossom Word Game",
            "description": "Free daily word hunt puzzle game, just like Spelling Bee.",
            "inLanguage": "en"
          },
          {
            "@type": "WebApplication",
            "@id": "https://blossomwordgame.com/#app",
            "name": "Blossom Word Game",
            "url": "https://blossomwordgame.com/",
            "applicationCategory": "GameApplication",
            "operatingSystem": "Any",
            "browserRequirements": "Requires JavaScript",
            "description": "Play Blossom Word Game free online. A new word hunt puzzle every day. Make words from the hive, score points, and reach Genius rank.",
            "image": "https://blossomwordgame.com/logo.png",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          }
        ]
      }
    </script>

    <script>
      // Apply the persisted theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
